<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qdrant Field Guide</title>
<style>
  :root {
    --bg: #09090b;
    --bg-card: #18181b;
    --bg-code: #1e1e22;
    --bg-inline: #27272a;
    --border: #2e2e33;
    --border-active: #3f3f46;
    --text: #e4e4e7;
    --text-muted: #a1a1aa;
    --text-dim: #71717a;
    --accent: #3b82f6;
    --accent-dim: rgba(59,130,246,0.12);
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --mono: 'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
    --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --content-width: 780px;
    --sidebar-width: 260px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; scroll-padding-top: 2rem; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .layout {
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: var(--sidebar-width);
    height: 100vh;
    overflow-y: auto;
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    z-index: 10;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-header {
    padding: 0 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.75rem;
  }

  .sidebar-header h2 {
    font-size: 0.8125rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .sidebar-header p {
    font-size: 0.6875rem;
    color: var(--text-dim);
    margin-top: 0.25rem;
  }

  .toc { list-style: none; }

  .toc li { margin: 0; }

  .toc a {
    display: block;
    padding: 0.3rem 1.25rem;
    font-size: 0.8125rem;
    color: var(--text-dim);
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    line-height: 1.4;
  }

  .toc a:hover { color: var(--text); background: var(--accent-dim); }

  .toc a.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--accent-dim);
  }

  .toc .toc-h3 { padding-left: 2rem; font-size: 0.75rem; }

  /* Main content */
  .main {
    margin-left: var(--sidebar-width);
    flex: 1;
    min-width: 0;
  }

  .content {
    max-width: var(--content-width);
    margin: 0 auto;
    padding: 2.5rem 2rem 6rem;
  }

  /* Typography */
  .content h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin: 0 0 0.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    color: #fff;
  }

  .content h2 {
    font-size: 1.375rem;
    font-weight: 650;
    letter-spacing: -0.02em;
    margin: 3rem 0 1rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    color: #fff;
  }

  .content h2:first-of-type { margin-top: 2rem; border-top: none; padding-top: 0; }

  .content h3 {
    font-size: 1.0625rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 2rem 0 0.75rem;
    color: var(--text);
  }

  .content h4 {
    font-size: 0.9375rem;
    font-weight: 600;
    margin: 1.5rem 0 0.5rem;
    color: var(--text-muted);
  }

  .content p { margin: 0 0 1rem; }

  .content ul, .content ol {
    margin: 0 0 1rem;
    padding-left: 1.5rem;
  }

  .content li { margin-bottom: 0.375rem; }

  .content li > ul, .content li > ol { margin-top: 0.375rem; margin-bottom: 0; }

  .content strong { color: #fff; font-weight: 600; }

  .content a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }

  .content a:hover { border-bottom-color: var(--accent); }

  .content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2.5rem 0;
  }

  .content blockquote {
    border-left: 3px solid var(--accent);
    padding: 0.5rem 1rem;
    margin: 0 0 1rem;
    background: var(--accent-dim);
    border-radius: 0 6px 6px 0;
    color: var(--text-muted);
  }

  .content blockquote p { margin-bottom: 0.5rem; }
  .content blockquote p:last-child { margin-bottom: 0; }

  /* Code */
  .content code {
    font-family: var(--mono);
    font-size: 0.8125em;
    background: var(--bg-inline);
    padding: 0.15em 0.4em;
    border-radius: 4px;
    color: #e2e8f0;
  }

  .content pre {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    overflow-x: auto;
    margin: 0 0 1.25rem;
    line-height: 1.5;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .content pre code {
    background: none;
    padding: 0;
    font-size: 0.8125rem;
    color: #d4d4d8;
    border-radius: 0;
  }

  /* Tables */
  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 0 0 1.25rem;
    font-size: 0.8125rem;
  }

  .content th {
    text-align: left;
    padding: 0.625rem 0.75rem;
    background: var(--bg-card);
    border-bottom: 2px solid var(--border);
    font-weight: 600;
    color: var(--text-muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .content td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .content tr:last-child td { border-bottom: none; }

  .content tr:hover td { background: rgba(255,255,255,0.02); }

  /* Decision tree code blocks — the big ASCII diagrams */
  .content pre code {
    white-space: pre;
    word-break: normal;
    overflow-wrap: normal;
  }

  /* Mermaid diagrams */
  .content .mermaid {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem 1rem;
    margin: 0 0 1.25rem;
    overflow-x: auto;
    text-align: center;
  }

  .content .mermaid svg {
    max-width: 100%;
    height: auto;
  }

  /* Scroll-to-top */
  .scroll-top {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 1.125rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s, background 0.2s;
    z-index: 20;
  }

  .scroll-top.visible { display: flex; }
  .scroll-top:hover { background: var(--border-active); color: var(--text); }

  /* Mobile */
  .menu-toggle {
    display: none;
    position: fixed;
    top: 0.75rem;
    left: 0.75rem;
    z-index: 30;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1.125rem;
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9;
  }

  @media (max-width: 768px) {
    .sidebar {
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .main { margin-left: 0; }
    .content { padding: 2rem 1.25rem 4rem; }
    .menu-toggle { display: flex; }
    .content h1 { font-size: 1.5rem; }
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
  }

  .loading-spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-bottom: 0.75rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">&#9776;</button>
<div class="sidebar-overlay" id="overlay"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Field Guide</h2>
      <p>Qdrant Vector Database Architecture</p>
    </div>
    <ul class="toc" id="toc"></ul>
  </nav>

  <main class="main">
    <article class="content" id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>Loading field guide...</div>
      </div>
    </article>
  </main>
</div>

<button class="scroll-top" id="scrollTop" aria-label="Scroll to top">&#8593;</button>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>
(async function() {
  // Fetch the markdown source of truth
  const res = await fetch('./qdrant-field-guide.md');
  if (!res.ok) {
    document.getElementById('content').innerHTML =
      '<div class="loading">Failed to load field guide. Make sure qdrant-field-guide.md is in the same directory.</div>';
    return;
  }
  const md = await res.text();

  // Initialize mermaid with dark theme
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      primaryColor: '#1e3a5f',
      primaryTextColor: '#e4e4e7',
      primaryBorderColor: '#3b82f6',
      lineColor: '#3f3f46',
      secondaryColor: '#27272a',
      tertiaryColor: '#18181b',
      background: '#09090b',
      mainBkg: '#18181b',
      nodeBorder: '#3f3f46',
      clusterBkg: '#18181b',
      clusterBorder: '#3f3f46',
      titleColor: '#e4e4e7',
      edgeLabelBackground: '#18181b',
      fontSize: '14px',
    },
    flowchart: { curve: 'basis', padding: 16 },
  });

  // Configure marked — custom renderer for mermaid fenced blocks
  const renderer = new marked.Renderer();
  const origCode = renderer.code;
  renderer.code = function({ text, lang }) {
    if (lang === 'mermaid') {
      return `<div class="mermaid">${text}</div>`;
    }
    return `<pre><code class="language-${lang || ''}">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
  };

  marked.setOptions({
    gfm: true,
    breaks: false,
    renderer,
  });

  // Render markdown to HTML
  const html = marked.parse(md);
  document.getElementById('content').innerHTML = html;

  // Render mermaid diagrams
  await mermaid.run({ querySelector: '.mermaid' });

  // Build table of contents from rendered headings
  buildTOC();

  // Set up scroll tracking
  setupScrollSpy();

  // Mobile menu
  setupMobileMenu();

  // Scroll-to-top
  setupScrollTop();

  function buildTOC() {
    const toc = document.getElementById('toc');
    const headings = document.querySelectorAll('.content h2, .content h3');
    const fragment = document.createDocumentFragment();

    headings.forEach((h, i) => {
      // Create stable anchor IDs
      const id = h.textContent
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .substring(0, 60);
      h.id = id;

      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = h.textContent;
      if (h.tagName === 'H3') a.classList.add('toc-h3');
      a.dataset.target = id;

      a.addEventListener('click', (e) => {
        // Close mobile menu on click
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
      });

      li.appendChild(a);
      fragment.appendChild(li);
    });

    toc.appendChild(fragment);
  }

  function setupScrollSpy() {
    const tocLinks = document.querySelectorAll('.toc a');
    const headings = Array.from(document.querySelectorAll('.content h2, .content h3'));

    if (headings.length === 0) return;

    let ticking = false;

    function updateActive() {
      const scrollY = window.scrollY + 80;
      let current = headings[0].id;

      for (const h of headings) {
        if (h.offsetTop <= scrollY) current = h.id;
      }

      tocLinks.forEach(link => {
        link.classList.toggle('active', link.dataset.target === current);
      });

      // Scroll active TOC link into view
      const activeLink = document.querySelector('.toc a.active');
      if (activeLink) {
        const sidebar = document.getElementById('sidebar');
        const linkTop = activeLink.offsetTop;
        const sidebarScroll = sidebar.scrollTop;
        const sidebarHeight = sidebar.clientHeight;
        if (linkTop < sidebarScroll + 100 || linkTop > sidebarScroll + sidebarHeight - 100) {
          sidebar.scrollTo({ top: linkTop - sidebarHeight / 3, behavior: 'smooth' });
        }
      }

      ticking = false;
    }

    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(updateActive);
        ticking = true;
      }
    });

    updateActive();
  }

  function setupMobileMenu() {
    const toggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    toggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
    });

    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    });
  }

  function setupScrollTop() {
    const btn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
      btn.classList.toggle('visible', window.scrollY > 500);
    });
    btn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
})();
</script>
</body>
</html>
